name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust_targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
            rust_targets: ""
          - platform: windows-latest
            args: "--bundles nsis"
            rust_targets: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Derive release metadata
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail

          version="$(node -p "require('./package.json').version")"

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" && -n "${GITHUB_REF_NAME:-}" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="v${version}"
          fi

          if [[ "${tag}" != "v${version}" ]]; then
            echo "Tag ${tag} does not match package.json version v${version}" >&2
            exit 1
          fi

          if [[ "${tag}" == *-* ]]; then
            channel="beta"
            prerelease="true"
          else
            channel="stable"
            prerelease="false"
          fi

          updater_notes_path=".github/updater-notes/${tag}.md"
          if [[ -f "${updater_notes_path}" ]]; then
            release_body="$(<"${updater_notes_path}")"
          else
            release_body="A new version is ready to install."
          fi

          {
            echo "tag=${tag}"
            echo "version=${version}"
            echo "channel=${channel}"
            echo "prerelease=${prerelease}"
            echo "release_body<<__SLY_RELEASE_BODY__"
            printf '%s\n' "${release_body}"
            echo "__SLY_RELEASE_BODY__"
          } >> "${GITHUB_OUTPUT}"

      - name: Install system dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo env DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=a apt-get install -y \
            --no-install-recommends libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Set updater channel
        run: node scripts/set-updater-channel.mjs "${{ steps.release_meta.outputs.channel }}"

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.release_meta.outputs.tag }}
          releaseName: "Sly v${{ steps.release_meta.outputs.version }}"
          releaseBody: ${{ steps.release_meta.outputs.release_body }}
          releaseDraft: true
          prerelease: ${{ steps.release_meta.outputs.prerelease }}
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}
