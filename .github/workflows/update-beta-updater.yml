name: Update Beta Updater Manifest

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-beta-manifest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Select effective release for the beta channel
        id: beta_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          node scripts/select-beta-channel-release.mjs \
            --repo "${{ github.repository }}" >> "${GITHUB_OUTPUT}"

      - name: Download latest.json from the effective beta release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p release-assets
          gh release download "${{ steps.beta_release.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "latest.json" \
            --dir release-assets

      - name: Publish manifest to updater-beta branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          publish_dir="$(mktemp -d)"
          cp release-assets/latest.json "${publish_dir}/latest.json"

          cd "${publish_dir}"
          git init
          git checkout -b updater-beta
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest.json
          git commit -m "Update beta manifest for ${{ steps.beta_release.outputs.tag }}"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git push --force origin updater-beta
