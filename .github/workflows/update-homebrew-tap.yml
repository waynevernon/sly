name: Update Homebrew Tap

"on":
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to publish to the Homebrew tap
        required: true
        type: string

permissions:
  contents: read

jobs:
  update-homebrew-tap:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Derive event release metadata
        id: event_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.inputs.tag_name || github.event.release.tag_name }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${RELEASE_TAG}" ]]; then
            echo "Missing release tag"
            exit 1
          fi

          release_json="$(gh release view "${RELEASE_TAG}" --repo "${{ github.repository }}" --json tagName,isPrerelease,assets)"
          export RELEASE_JSON="${release_json}"

          node <<'NODE' >> "${GITHUB_OUTPUT}"
          const release = JSON.parse(process.env.RELEASE_JSON);
          const version = release.tagName.replace(/^v/, "");
          const assetName = `Sly_${version}_universal.dmg`;
          const asset = release.assets.find((candidate) => candidate.name === assetName);

          if (!asset) {
            console.error(`Missing release asset ${assetName}`);
            process.exit(1);
          }

          if (!asset.digest || !asset.digest.startsWith("sha256:")) {
            console.error(`Missing SHA-256 digest for ${assetName}`);
            process.exit(1);
          }

          console.log(`is_prerelease=${release.isPrerelease ? "true" : "false"}`);
          console.log(`version=${version}`);
          console.log(`sha256=${asset.digest.slice("sha256:".length)}`);
          NODE

      - name: Derive effective beta release metadata
        id: beta_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          node scripts/select-beta-channel-release.mjs \
            --repo "${{ github.repository }}" >> "${GITHUB_OUTPUT}"

          release_json="$(gh release view "${{ steps.beta_release.outputs.tag }}" --repo "${{ github.repository }}" --json assets)"
          export RELEASE_JSON="${release_json}"
          export RELEASE_VERSION="${{ steps.beta_release.outputs.version }}"

          node <<'NODE' >> "${GITHUB_OUTPUT}"
          const release = JSON.parse(process.env.RELEASE_JSON);
          const version = process.env.RELEASE_VERSION;
          const assetName = `Sly_${version}_universal.dmg`;
          const asset = release.assets.find((candidate) => candidate.name === assetName);

          if (!asset) {
            console.error(`Missing release asset ${assetName}`);
            process.exit(1);
          }

          if (!asset.digest || !asset.digest.startsWith("sha256:")) {
            console.error(`Missing SHA-256 digest for ${assetName}`);
            process.exit(1);
          }

          console.log(`sha256=${asset.digest.slice("sha256:".length)}`);
          NODE

      - name: Clone tap repository
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/waynevernon/homebrew-sly.git" "${RUNNER_TEMP}/homebrew-sly"

      - name: Update stable cask file
        if: steps.event_release.outputs.is_prerelease != 'true'
        run: |
          set -euo pipefail
          node scripts/update-homebrew-cask.mjs \
            --tap-dir "${RUNNER_TEMP}/homebrew-sly" \
            --channel "stable" \
            --version "${{ steps.event_release.outputs.version }}" \
            --sha256 "${{ steps.event_release.outputs.sha256 }}"

      - name: Update beta cask file
        run: |
          set -euo pipefail
          node scripts/update-homebrew-cask.mjs \
            --tap-dir "${RUNNER_TEMP}/homebrew-sly" \
            --channel "beta" \
            --version "${{ steps.beta_release.outputs.version }}" \
            --sha256 "${{ steps.beta_release.outputs.sha256 }}"

      - name: Commit and push cask bump
        working-directory: ${{ runner.temp }}/homebrew-sly
        run: |
          set -euo pipefail

          if git diff --quiet; then
            echo "No tap changes to publish"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/sly.rb Casks/sly@beta.rb
          git commit -m "Update Homebrew casks for ${{ github.event.inputs.tag_name || github.event.release.tag_name }}"
          git push origin HEAD
