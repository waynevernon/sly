version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    ignore:
      # ESLint 10 is blocked on eslint-plugin-react-hooks releasing stable support.
      # Remove once a stable version with ESLint 10 peer support is released.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@eslint/js"
        update-types: ["version-update:semver-major"]
    groups:
      tiptap:
        patterns:
          - "@tiptap/*"
      tauri:
        patterns:
          - "@tauri-apps/*"
      radix-ui:
        patterns:
          - "@radix-ui/*"
      dnd-kit:
        patterns:
          - "@dnd-kit/*"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vitest"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      eslint:
        patterns:
          - "eslint"
          - "eslint-*"
          - "typescript-eslint"
          - "@eslint/*"
      types:
        patterns:
          - "@types/*"
      testing:
        patterns:
          - "@testing-library/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5

  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      tauri:
        patterns:
          - "tauri"
          - "tauri-*"
      rust-deps:
        patterns:
          - "*"
        exclude-patterns:
          - "tauri"
          - "tauri-*"
